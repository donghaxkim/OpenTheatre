<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="ot/tokens.css" />
  <style>
    body { width: 300px; margin: 0; font-family: var(--font), system-ui, sans-serif;
      background: var(--bg-deep); color: var(--text); }
    .pad { padding: 16px; }
    .row { display: flex; align-items: center; gap: 10px; }
    .ava { width: 38px; height: 38px; border-radius: 50%; display: grid;
      place-items: center; font-weight: 600; color: #181613; flex: none; }
    input { font-family: inherit; font-size: 13px; color: var(--text);
      background: var(--bg); border: 1px solid var(--line-2); border-radius: 8px;
      padding: 9px 11px; outline: none; }
    input:focus { border-color: var(--text-faint); }
    button { font-family: inherit; cursor: pointer; }
    .primary { width: 100%; padding: 11px; border: none; border-radius: 9px;
      background: var(--text); color: var(--bg-deep); font-weight: 600; font-size: 13px; }
    .swatches { display: flex; justify-content: space-between; margin: 10px 0; }
    .sw { width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer; }
    .sw.on { box-shadow: 0 0 0 2px var(--bg-deep), 0 0 0 4px var(--text); }
    .hint { font-size: 11px; color: var(--text-faint); }
    .sep { display: flex; align-items: center; gap: 8px; margin: 14px 0;
      color: var(--text-faint); font-size: 11px; }
    .sep::before, .sep::after { content: ""; flex: 1; height: 1px; background: var(--line); }
    .join { display: flex; gap: 7px; }
    .join input { flex: 1; font-family: var(--mono), monospace; letter-spacing: .14em;
      text-transform: uppercase; }
    .join button { padding: 0 14px; border: 1px solid var(--line-2); border-radius: 8px;
      background: transparent; color: var(--text-dim); font-size: 12px; }
    #err { color: #c8695b; font-size: 11px; min-height: 14px; }
    [hidden] { display: none; }
  </style>
</head>
<body>
  <div class="pad">
    <!-- first-run profile setup -->
    <section id="setup" hidden>
      <p class="hint">Pick a name and colour to get started.</p>
      <div class="row" style="margin:10px 0">
        <div class="ava" id="setupAva">?</div>
        <input id="setupName" placeholder="Your name" maxlength="20" style="flex:1" />
      </div>
      <div class="swatches" id="swatches"></div>
      <button class="primary" id="saveProfile">Save</button>
    </section>

    <!-- normal: create or join -->
    <section id="main" hidden>
      <div class="row" style="margin-bottom:14px">
        <div class="ava" id="meAva">?</div>
        <b id="meName" style="font-size:13px"></b>
      </div>
      <button class="primary" id="createBtn">Create a room</button>
      <div class="sep">or join with a code</div>
      <div class="join">
        <input id="codeInput" placeholder="B3K7M9" maxlength="6" />
        <button id="joinBtn">Join</button>
      </div>
      <p id="err"></p>
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
